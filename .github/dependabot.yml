version: 2
updates:
  # JS dependencies — package.json + bun.lock
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      # Bundle all minor + patch bumps (prod and dev) into one PR to cut noise.
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    # Major bumps are intentionally left ungrouped so each lands as its own PR —
    # they can break (e.g. the MUI v5 -> v9 migration) and warrant a careful look.
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'

  # GitHub Actions pinned in .github/workflows/deploy.yml
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      github-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'
